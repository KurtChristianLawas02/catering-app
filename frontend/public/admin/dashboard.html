<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Ratskie Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F2ED; --sidebar: #2C2C2C; --card: #FFFFFF;
      --gold: #C9A84C; --gold-light: #E8C97A;
      --text: #2C2C2C; --muted: #9A8A7A; --border: #E8E2D8;
      --pending: #C9A84C; --approved: #4A7C59; --completed: #5A7BA8; --cancelled: #9B4444;
    }
    body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar {
      width: 240px; min-height: 100vh; background: var(--sidebar);
      display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
      transition: transform 0.3s;
    }
    .sidebar-brand {
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .sidebar-brand .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; color: #FAF7F2;
    }
    .sidebar-brand .logo span { color: var(--gold); }
    .sidebar-brand p { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.35); margin-top: 0.3rem; }
    .sidebar-nav { flex: 1; padding: 1.5rem 0; }
    .nav-section-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(255,255,255,0.25); padding: 0.5rem 1.5rem 0.5rem; margin-top: 1rem; }
    .nav-item {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.8rem 1.5rem; cursor: pointer; transition: background 0.2s;
      font-size: 0.85rem; color: rgba(255,255,255,0.6);
      text-decoration: none;
    }
    .nav-item:hover, .nav-item.active { background: rgba(201,168,76,0.12); color: var(--gold-light); }
    .nav-item .icon { width: 18px; text-align: center; font-size: 1rem; }
    .sidebar-footer { padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.07); }
    .admin-info { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1rem; }
    .admin-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(201,168,76,0.2); border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; color: var(--gold); font-weight: 600;
    }
    .admin-name { font-size: 0.82rem; color: rgba(255,255,255,0.8); }
    .admin-role { font-size: 0.68rem; color: rgba(255,255,255,0.35); }
    .btn-logout {
      display: block; width: 100%; padding: 0.6rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5); font-family: 'Jost'; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-logout:hover { background: rgba(155,68,68,0.2); border-color: rgba(155,68,68,0.4); color: #E8A0A0; }

    /* Main */
    .main { margin-left: 240px; flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 1.2rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 40;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: 1rem; }
    .hamburger-btn { display: none; background: none; border: none; cursor: pointer; font-size: 1.2rem; }

    .content { padding: 2.5rem; flex: 1; }

    /* Stats cards */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1.2rem; margin-bottom: 2.5rem; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      padding: 1.5rem; border-radius: 4px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.07); }
    .stat-card .s-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.6rem; }
    .stat-card .s-num { font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-weight: 600; line-height: 1; }
    .stat-card.total .s-num { color: var(--text); }
    .stat-card.pending .s-num { color: var(--pending); }
    .stat-card.approved .s-num { color: var(--approved); }
    .stat-card.completed .s-num { color: var(--completed); }
    .stat-card.cancelled .s-num { color: var(--cancelled); }

    /* Toolbar */
    .toolbar {
      display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .search-box {
      flex: 1; min-width: 220px;
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--card); border: 1px solid var(--border);
      padding: 0.65rem 1rem; border-radius: 3px;
    }
    .search-box input {
      border: none; background: transparent; font-family: 'Jost'; font-size: 0.88rem;
      outline: none; flex: 1; color: var(--text);
    }
    .search-box span { color: var(--muted); }
    .filter-select {
      padding: 0.65rem 1rem; background: var(--card); border: 1px solid var(--border);
      font-family: 'Jost'; font-size: 0.85rem; color: var(--text); outline: none; border-radius: 3px;
    }

    /* Table */
    .table-wrap {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden;
    }
    .table-header {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .table-header h3 { font-size: 0.9rem; font-weight: 600; }
    .table-wrap table { width: 100%; border-collapse: collapse; }
    .table-wrap th {
      background: #F8F5F0; padding: 0.9rem 1.2rem;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); font-weight: 600; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .table-wrap td {
      padding: 1rem 1.2rem; border-bottom: 1px solid var(--border);
      font-size: 0.85rem; vertical-align: middle;
    }
    .table-wrap tr:last-child td { border-bottom: none; }
    .table-wrap tr:hover td { background: #FDFBF7; }
    .customer-name { font-weight: 500; }
    .customer-email { font-size: 0.78rem; color: var(--muted); }

    /* Status badge */
    .badge {
      display: inline-block; padding: 0.3rem 0.7rem; border-radius: 100px;
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em;
      white-space: nowrap;
    }
    .badge.pending { background: rgba(201,168,76,0.12); color: #8B6E00; }
    .badge.approved { background: rgba(74,124,89,0.12); color: #2E6644; }
    .badge.completed { background: rgba(90,123,168,0.12); color: #2A4D7A; }
    .badge.cancelled { background: rgba(155,68,68,0.12); color: #7A2020; }

    /* Action buttons */
    .actions { display: flex; gap: 0.4rem; }
    .btn-icon {
      padding: 0.4rem 0.7rem; border: 1px solid var(--border);
      background: transparent; cursor: pointer; font-size: 0.78rem;
      border-radius: 3px; font-family: 'Jost'; transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--bg); }
    .btn-icon.view:hover { border-color: var(--gold); color: var(--gold); }
    .btn-icon.delete:hover { border-color: var(--cancelled); color: var(--cancelled); }

    /* Empty state */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-state .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; }

    /* Pagination */
    .pagination {
      padding: 1.2rem 1.5rem; border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .pagination .info { font-size: 0.8rem; color: var(--muted); }
    .pagination-btns { display: flex; gap: 0.4rem; }
    .pg-btn {
      padding: 0.4rem 0.9rem; border: 1px solid var(--border); background: transparent;
      font-family: 'Jost'; font-size: 0.8rem; cursor: pointer; border-radius: 3px; transition: all 0.2s;
    }
    .pg-btn:hover, .pg-btn.active { background: var(--gold); border-color: var(--gold); color: white; }
    .pg-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 2rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card); width: 100%; max-width: 760px; max-height: 90vh;
      overflow-y: auto; border-radius: 4px; box-shadow: 0 30px 80px rgba(0,0,0,0.2);
    }
    .modal-header {
      padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      position: sticky; top: 0; background: var(--card); z-index: 1;
    }
    .modal-header h3 { font-size: 1rem; font-weight: 600; }
    .modal-close {
      background: none; border: none; font-size: 1.4rem; cursor: pointer;
      color: var(--muted); padding: 0.2rem; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 2rem; }

    /* Detail grid */
    .detail-section { margin-bottom: 2rem; }
    .detail-section-title {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--gold); margin-bottom: 1rem; padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .detail-item .dl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.25rem; }
    .detail-item .dv { font-size: 0.9rem; font-weight: 500; }
    .detail-item.full { grid-column: span 2; }

    /* Status changer in modal */
    .status-changer { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; }
    .status-btn {
      padding: 0.5rem 1rem; border: 1px solid var(--border); background: transparent;
      cursor: pointer; font-family: 'Jost'; font-size: 0.78rem; border-radius: 100px;
      transition: all 0.2s; text-transform: capitalize;
    }
    .status-btn:hover { border-color: var(--gold); }
    .status-btn.active-status { font-weight: 600; }
    .status-btn[data-s="pending"].active-status { background: rgba(201,168,76,0.12); border-color: var(--pending); color: #8B6E00; }
    .status-btn[data-s="approved"].active-status { background: rgba(74,124,89,0.12); border-color: var(--approved); color: #2E6644; }
    .status-btn[data-s="completed"].active-status { background: rgba(90,123,168,0.12); border-color: var(--completed); color: #2A4D7A; }
    .status-btn[data-s="cancelled"].active-status { background: rgba(155,68,68,0.12); border-color: var(--cancelled); color: #7A2020; }
    .modal-footer {
      padding: 1.5rem 2rem; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 0.8rem;
    }
    .btn-danger {
      padding: 0.7rem 1.5rem; background: rgba(155,68,68,0.08); border: 1px solid rgba(155,68,68,0.3);
      color: var(--cancelled); cursor: pointer; font-family: 'Jost'; font-size: 0.82rem;
      text-transform: uppercase; letter-spacing: 0.1em; border-radius: 2px; transition: all 0.2s;
    }
    .btn-danger:hover { background: rgba(155,68,68,0.2); }
    .inspiration-img { max-width: 100%; max-height: 200px; object-fit: contain; margin-top: 0.5rem; border: 1px solid var(--border); border-radius: 3px; }

    /* Confirm dialog */
    .confirm-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: var(--card); padding: 2rem; max-width: 380px; width: 90%;
      border-radius: 4px; text-align: center;
    }
    .confirm-box h4 { margin-bottom: 0.8rem; font-size: 1rem; }
    .confirm-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }
    .confirm-btns { display: flex; gap: 0.8rem; justify-content: center; }
    .btn-cancel-confirm {
      padding: 0.7rem 1.5rem; background: transparent; border: 1px solid var(--border);
      cursor: pointer; font-family: 'Jost'; border-radius: 2px; font-size: 0.82rem;
    }
    .btn-confirm-del {
      padding: 0.7rem 1.5rem; background: var(--cancelled); border: none; color: white;
      cursor: pointer; font-family: 'Jost'; border-radius: 2px; font-size: 0.82rem; font-weight: 600;
    }

    /* Toast */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem; z-index: 500;
      padding: 1rem 1.5rem; background: #2C2C2C; color: #FAF7F2;
      font-size: 0.85rem; border-radius: 4px;
      transform: translateY(100px); opacity: 0; transition: all 0.35s;
      display: flex; align-items: center; gap: 0.6rem; max-width: 320px;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-left: 3px solid var(--approved); }
    .toast.error { border-left: 3px solid var(--cancelled); }

    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .hamburger-btn { display: block; }
      .detail-grid { grid-template-columns: 1fr; }
      .detail-item.full { grid-column: span 1; }
    }
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .toolbar { flex-direction: column; gap: 0.8rem; }
      .search-box { min-width: 100%; flex: unset; }
      .filter-select { width: 100%; }
      .content { padding: 1.5rem; }
      .topbar { padding: 1rem 1.5rem; }
      .table-wrap { font-size: 0.8rem; }
      .table-wrap th { padding: 0.7rem 0.9rem; font-size: 0.65rem; }
      .table-wrap td { padding: 0.8rem 0.9rem; font-size: 0.8rem; }
      .detail-grid { gap: 0.8rem; }
      .modal { max-width: 95%; }
      .modal-body { padding: 1.5rem; }
      .modal-header { padding: 1.2rem 1.5rem; }
      .modal-footer { padding: 1.2rem 1.5rem; flex-wrap: wrap; }
      .confirm-box { width: 85%; }
      .toast { bottom: 1rem; right: 1rem; left: 1rem; max-width: unset; }
    }
    @media (max-width: 600px) {
      .content { padding: 1rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .stat-card { padding: 1rem; }
      .stat-card .s-label { font-size: 0.65rem; margin-bottom: 0.4rem; }
      .stat-card .s-num { font-size: 1.8rem; }
      .topbar { padding: 0.8rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .topbar h1 { font-size: 1rem; }
      .topbar-right { font-size: 0.7rem; }
      .search-box { font-size: 0.8rem; padding: 0.5rem 0.8rem; }
      .search-box input { font-size: 0.75rem; }
      .filter-select { font-size: 0.75rem; padding: 0.5rem 0.8rem; }
      .table-wrap th { padding: 0.6rem 0.7rem; font-size: 0.6rem; }
      .table-wrap td { padding: 0.6rem 0.7rem; font-size: 0.75rem; }
      .table-header { padding: 1rem; }
      .table-header h3 { font-size: 0.85rem; }
      .pagination { padding: 1rem; flex-direction: column; }
      .pagination .info { font-size: 0.7rem; }
      .pagination-btns { gap: 0.3rem; }
      .pg-btn { padding: 0.35rem 0.7rem; font-size: 0.7rem; }
      .btn-icon { padding: 0.3rem 0.6rem; font-size: 0.7rem; }
      .badge { padding: 0.25rem 0.6rem; font-size: 0.65rem; }
      .actions { gap: 0.3rem; }
      .modal-body { padding: 1rem; }
      .modal-header { padding: 1rem 1.2rem; }
      .detail-item .dl { font-size: 0.65rem; }
      .detail-item .dv { font-size: 0.8rem; }
      .detail-section-title { font-size: 0.65rem; }
      .status-changer { gap: 0.4rem; margin-top: 0.6rem; }
      .status-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
      .btn-danger { padding: 0.6rem 1rem; font-size: 0.75rem; }
      .modal-footer { padding: 1rem; gap: 0.6rem; }
      .btn-cancel-confirm { padding: 0.6rem 1.2rem; font-size: 0.75rem; }
      .btn-confirm-del { padding: 0.6rem 1.2rem; font-size: 0.75rem; }
      .btn-logout { padding: 0.5rem; font-size: 0.7rem; }
      .admin-name { font-size: 0.75rem; }
      .admin-role { font-size: 0.6rem; }
      .empty-state { padding: 2rem 1rem; }
      .empty-state .empty-icon { font-size: 2rem; }
      .empty-state p { font-size: 0.8rem; }
      .customer-email { font-size: 0.7rem; }
      .inspiration-img { max-height: 150px; }
    }
    @media (max-width: 480px) {
      .content { padding: 0.8rem; }
      .sidebar { width: 220px; }
      .sidebar-brand { padding: 1.5rem 1rem; }
      .sidebar-brand .logo { font-size: 1.3rem; }
      .sidebar-brand p { font-size: 0.6rem; }
      .nav-item { padding: 0.7rem 1rem; font-size: 0.8rem; gap: 0.6rem; }
      .nav-item .icon { width: 16px; font-size: 0.9rem; }
      .nav-section-label { font-size: 0.55rem; padding: 0.4rem 1rem; }
      .sidebar-footer { padding: 1rem; }
      .admin-avatar { width: 32px; height: 32px; font-size: 0.7rem; }
      .admin-info { gap: 0.6rem; margin-bottom: 0.8rem; }
      .stats-grid { grid-template-columns: 1fr; gap: 0.6rem; margin-bottom: 1.5rem; }
      .stat-card { padding: 0.8rem; }
      .stat-card .s-label { font-size: 0.6rem; }
      .stat-card .s-num { font-size: 1.5rem; }
      .toolbar { gap: 0.6rem; }
      .topbar { padding: 0.6rem 0.8rem; }
      .topbar h1 { font-size: 0.9rem; }
      .hamburger-btn { font-size: 1rem; }
      .table-wrap th { padding: 0.5rem 0.6rem; font-size: 0.55rem; }
      .table-wrap td { padding: 0.5rem 0.6rem; font-size: 0.7rem; }
      .table-header { padding: 0.8rem; }
      .table-header h3 { font-size: 0.8rem; }
      .pagination { padding: 0.8rem; }
      .modal { max-width: 100%; border-radius: 8px 8px 0 0; }
      .modal-header { padding: 0.9rem; }
      .modal-header h3 { font-size: 0.95rem; }
      .modal-body { padding: 0.9rem; }
      .modal-footer { padding: 0.9rem; }
      .detail-grid { gap: 0.6rem; }
      .detail-item .dl { font-size: 0.6rem; margin-bottom: 0.2rem; }
      .detail-item .dv { font-size: 0.75rem; }
      .detail-section-title { font-size: 0.6rem; margin-bottom: 0.8rem; }
      .btn-icon { padding: 0.3rem 0.5rem; font-size: 0.65rem; }
      .confirm-box { width: 90%; }
      .confirm-box h4 { font-size: 0.95rem; margin-bottom: 0.6rem; }
      .confirm-box p { font-size: 0.8rem; margin-bottom: 1rem; }
      .toast { font-size: 0.8rem; padding: 0.9rem 1.2rem; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="logo">Ratskie<span>✦</span></div>
    <p>Admin Dashboard</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a class="nav-item active" href="#" onclick="showPage('inquiries')">
      <span class="icon">📋</span> Inquiries
    </a>
    <a class="nav-item" href="/" target="_blank">
      <span class="icon">🌐</span> View Site
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="admin-info">
      <div class="admin-avatar" id="adminInitial">A</div>
      <div>
        <div class="admin-name" id="adminName">Admin</div>
        <div class="admin-role">Administrator</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Sign Out</button>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:1rem">
      <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
      <h1 id="pageTitle">Inquiries</h1>
    </div>
    <div class="topbar-right">
      <span style="font-size:0.8rem;color:var(--muted)" id="dateDisplay"></span>
    </div>
  </header>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card total"><div class="s-label">Total Inquiries</div><div class="s-num" id="statTotal">—</div></div>
      <div class="stat-card pending"><div class="s-label">Pending</div><div class="s-num" id="statPending">—</div></div>
      <div class="stat-card approved"><div class="s-label">Approved</div><div class="s-num" id="statApproved">—</div></div>
      <div class="stat-card completed"><div class="s-label">Completed</div><div class="s-num" id="statCompleted">—</div></div>
      <div class="stat-card cancelled"><div class="s-label">Cancelled</div><div class="s-num" id="statCancelled">—</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-box">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search by name, email, or event type...">
      </div>
      <select class="filter-select" id="statusFilter">
        <option value="all">All Statuses</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-header">
        <h3>All Inquiries</h3>
        <span style="font-size:0.8rem;color:var(--muted)" id="resultCount"></span>
      </div>
      <div id="tableContainer">
        <div class="loading">Loading inquiries...</div>
      </div>
      <div class="pagination" id="paginationWrap"></div>
    </div>
  </div>
</div>

<!-- View/Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h3>Inquiry Details</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-danger" id="modalDeleteBtn">🗑 Delete Inquiry</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h4>Delete Inquiry?</h4>
    <p>This action cannot be undone. The inquiry will be permanently removed.</p>
    <div class="confirm-btns">
      <button class="btn-cancel-confirm" onclick="closeConfirm()">Cancel</button>
      <button class="btn-confirm-del" id="confirmDelBtn">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const TOKEN = localStorage.getItem('catering_token');
  if (!TOKEN) window.location.href = '/admin/index.html';

  const admin = JSON.parse(localStorage.getItem('catering_admin') || '{}');
  document.getElementById('adminName').textContent = admin.full_name || admin.username || 'Admin';
  document.getElementById('adminInitial').textContent = (admin.full_name || 'A')[0].toUpperCase();
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let currentPage = 1;
  let currentInquiryId = null;
  let deleteTargetId = null;
  let searchTimer;

  function authHeaders() {
    return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' };
  }

  function logout() {
    localStorage.removeItem('catering_token');
    localStorage.removeItem('catering_admin');
    window.location.href = '/admin/index.html';
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // Load stats
  async function loadStats() {
    try {
      const res = await fetch('/api/inquiries/stats', { headers: authHeaders() });
      if (res.status === 403) { logout(); return; }
      const d = await res.json();
      document.getElementById('statTotal').textContent = d.counts.total || 0;
      document.getElementById('statPending').textContent = d.counts.pending || 0;
      document.getElementById('statApproved').textContent = d.counts.approved || 0;
      document.getElementById('statCompleted').textContent = d.counts.completed || 0;
      document.getElementById('statCancelled').textContent = d.counts.cancelled || 0;
    } catch {}
  }

  // Load inquiries
  async function loadInquiries() {
    const search = document.getElementById('searchInput').value;
    const status = document.getElementById('statusFilter').value;
    const container = document.getElementById('tableContainer');
    container.innerHTML = '<div class="loading">Loading...</div>';

    try {
      const params = new URLSearchParams({ page: currentPage, limit: 15, status, search });
      const res = await fetch(`/api/inquiries?${params}`, { headers: authHeaders() });
      if (res.status === 403) { logout(); return; }
      const { data, total, page, limit } = await res.json();

      document.getElementById('resultCount').textContent = `${total} record${total !== 1 ? 's' : ''}`;

      if (!data || data.length === 0) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No inquiries found.</p></div>`;
        document.getElementById('paginationWrap').innerHTML = '';
        return;
      }

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Event Type</th>
              <th>Event Date</th>
              <th>Package</th>
              <th>Guests</th>
              <th>Status</th>
              <th>Submitted</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(row => `
              <tr>
                <td style="color:var(--muted);font-size:0.78rem">#${row.id}</td>
                <td>
                  <div class="customer-name">${esc(row.customer_name)}</div>
                  <div class="customer-email">${esc(row.customer_email)}</div>
                </td>
                <td>${capitalize(row.event_type)}</td>
                <td>${formatDate(row.event_date)}</td>
                <td>${capitalize(row.food_package)}</td>
                <td>${row.guest_count}</td>
                <td><span class="badge ${row.status}">${row.status}</span></td>
                <td style="font-size:0.78rem;color:var(--muted)">${formatDate(row.created_at)}</td>
                <td>
                  <div class="actions">
                    <button class="btn-icon view" onclick="openModal(${row.id})">View</button>
                    <button class="btn-icon delete" onclick="promptDelete(${row.id})">Delete</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      // Pagination
      const totalPages = Math.ceil(total / limit);
      let pgHtml = `<div class="info">Showing ${(page-1)*limit+1}–${Math.min(page*limit,total)} of ${total}</div>`;
      pgHtml += `<div class="pagination-btns">`;
      pgHtml += `<button class="pg-btn" onclick="goPage(${page-1})" ${page <= 1 ? 'disabled' : ''}>← Prev</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (totalPages <= 7 || Math.abs(i - page) <= 2 || i === 1 || i === totalPages) {
          pgHtml += `<button class="pg-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
        } else if (Math.abs(i - page) === 3) {
          pgHtml += `<span style="padding:0.4rem">…</span>`;
        }
      }
      pgHtml += `<button class="pg-btn" onclick="goPage(${page+1})" ${page >= totalPages ? 'disabled' : ''}>Next →</button>`;
      pgHtml += `</div>`;
      document.getElementById('paginationWrap').innerHTML = pgHtml;

    } catch (e) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Failed to load data. Please refresh.</p></div>`;
    }
  }

  function goPage(p) { currentPage = p; loadInquiries(); }

  // Open modal
  async function openModal(id) {
    currentInquiryId = id;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalBody').innerHTML = '<div class="loading">Loading details...</div>';

    try {
      const res = await fetch(`/api/inquiries/${id}`, { headers: authHeaders() });
      const d = await res.json();

      document.getElementById('modalBody').innerHTML = `
        <div class="detail-section">
          <div class="detail-section-title">👤 Customer Details</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="dl">Full Name</div><div class="dv">${esc(d.customer_name)}</div></div>
            <div class="detail-item"><div class="dl">Phone</div><div class="dv">${esc(d.customer_phone)}</div></div>
            <div class="detail-item"><div class="dl">Email</div><div class="dv">${esc(d.customer_email)}</div></div>
            <div class="detail-item"><div class="dl">Address</div><div class="dv">${esc(d.customer_address)}</div></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">📅 Event Details</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="dl">Event Type</div><div class="dv">${capitalize(d.event_type)}</div></div>
            <div class="detail-item"><div class="dl">Guest Count</div><div class="dv">${d.guest_count} guests</div></div>
            <div class="detail-item"><div class="dl">Event Date</div><div class="dv">${formatDate(d.event_date)}</div></div>
            <div class="detail-item"><div class="dl">Event Time</div><div class="dv">${d.event_time}</div></div>
            <div class="detail-item full"><div class="dl">Venue</div><div class="dv">${esc(d.event_venue)}</div></div>
            ${d.special_requests ? `<div class="detail-item full"><div class="dl">Special Requests</div><div class="dv">${esc(d.special_requests)}</div></div>` : ''}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">🍽️ Package & Design Selections</div>
          <div class="detail-grid">
            <div class="detail-item"><div class="dl">Food Package</div><div class="dv">${capitalize(d.food_package)}</div></div>
            <div class="detail-item"><div class="dl">Decoration Theme</div><div class="dv">${capitalize(d.decoration_theme)}</div></div>
            <div class="detail-item full"><div class="dl">Flower Arrangement</div><div class="dv">${d.flower_arrangement.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</div></div>
            ${d.food_package_details ? `<div class="detail-item full"><div class="dl">Food Notes</div><div class="dv">${esc(d.food_package_details)}</div></div>` : ''}
          </div>
          ${d.inspiration_image ? `
            <div style="margin-top:1rem">
              <div class="dl" style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.5rem">Inspiration Image</div>
              <img src="/uploads/${esc(d.inspiration_image)}" alt="Inspiration" class="inspiration-img">
            </div>` : ''}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">📌 Update Status</div>
          <p style="font-size:0.82rem;color:var(--muted);margin-bottom:0.8rem">Current status: <strong>${d.status}</strong></p>
          <div class="status-changer">
            ${['pending','approved','completed','cancelled'].map(s => `
              <button class="status-btn ${d.status===s?'active-status':''}" data-s="${s}" onclick="updateStatus(${d.id},'${s}',this)">
                ${s}
              </button>
            `).join('')}
          </div>
        </div>

        <div style="font-size:0.75rem;color:var(--muted);margin-top:1rem">
          Submitted: ${new Date(d.created_at).toLocaleString()} · Last updated: ${new Date(d.updated_at).toLocaleString()}
        </div>
      `;
    } catch {
      document.getElementById('modalBody').innerHTML = '<div class="loading">Failed to load details.</div>';
    }

    document.getElementById('modalDeleteBtn').onclick = () => promptDelete(id);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    currentInquiryId = null;
  }

  // Update status
  async function updateStatus(id, status, btn) {
    try {
      const res = await fetch(`/api/inquiries/${id}/status`, {
        method: 'PATCH',
        headers: authHeaders(),
        body: JSON.stringify({ status })
      });
      const d = await res.json();
      if (res.ok) {
        showToast(d.message);
        // Update buttons
        btn.closest('.status-changer').querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-status'));
        btn.classList.add('active-status');
        // Update table badge
        loadInquiries(); loadStats();
      } else {
        showToast(d.message, 'error');
      }
    } catch {
      showToast('Failed to update status.', 'error');
    }
  }

  // Delete
  function promptDelete(id) {
    deleteTargetId = id;
    document.getElementById('confirmOverlay').classList.add('open');
    document.getElementById('confirmDelBtn').onclick = async () => {
      try {
        const res = await fetch(`/api/inquiries/${deleteTargetId}`, { method: 'DELETE', headers: authHeaders() });
        const d = await res.json();
        if (res.ok) {
          showToast(d.message);
          closeConfirm();
          closeModal();
          loadInquiries();
          loadStats();
        } else {
          showToast(d.message, 'error');
          closeConfirm();
        }
      } catch {
        showToast('Delete failed.', 'error');
        closeConfirm();
      }
    };
  }

  function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('open');
    deleteTargetId = null;
  }

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });

  // Search / filter
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadInquiries(); }, 400);
  });
  document.getElementById('statusFilter').addEventListener('change', () => { currentPage = 1; loadInquiries(); });

  // Helpers
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function capitalize(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''; }
  function formatDate(d) {
    if (!d) return '—';
    return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }

  // Init
  loadStats();
  loadInquiries();
</script>
</body>
</html>
